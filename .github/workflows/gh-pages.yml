name: Build and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy Astro site
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Setup plugin list
      - name: Clone Plugin Index
        run: git clone https://github.com/Ewwii-sh/plugin-index.git
      - name: Copy Plugins
        run: |
          mkdir -p ./src/content/plugins/
          cp ./plugin-index/index/* ./src/content/plugins/

      # Setup article list
      - name: Clone Article Index
        run: git clone https://github.com/Ewwii-sh/article-index.git
      - name: Copy Articles
        run: |
          mkdir -p ./src/content/articles/
          cp ./article-index/index/* ./src/content/articles/

      # Build Astro site
      - name: Build site
        run: pnpm run build

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
